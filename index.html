<html lang="ko">

<meta charset="utf-8" />

<style>
  /* ===== 데이터·색은 아래 CONFIG(스크립트)에서 바꾸세요 ===== */
  :root{
    --bg: #ffffff;
    --ink: #16171a;         /* 본문 글자 */
    --ink-soft: #6b7075;    /* 보조 글자 */
    --line: rgba(20,23,26,.07); /* 아주 흐린 경계 */
    --accent: #16171a;      /* 강조(선택된 항목) */
    --panel: rgba(255,255,255,.6);
    --radius: 22px;
    --ease: cubic-bezier(.22,.61,.36,1);
    --font: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI",
            "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family: var(--font);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.6;
    /* 아주 은은한 배경 글로우 — 흰 바탕에 경계감을 지운다 */
    background-image:
      radial-gradient(1200px 700px at 12% -8%, rgba(120,130,255,.055), transparent 60%),
      radial-gradient(1000px 600px at 108% 10%, rgba(255,150,120,.045), transparent 55%);
    background-attachment: fixed;
  }

  .wrap{
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* =======================================================================
     인트로(첫 입장) 화면
     ======================================================================= */
  .intro{
    position: fixed;
    inset: 0;
    z-index: 60;
    display: flex;
    align-items: center;
    background: var(--bg);
    background-image:
      radial-gradient(1200px 700px at 12% -8%, rgba(120,130,255,.07), transparent 60%),
      radial-gradient(1000px 600px at 108% 10%, rgba(255,150,120,.06), transparent 55%);
    transition: opacity .7s var(--ease), transform .7s var(--ease), filter .7s var(--ease);
  }
  .intro.leaving{
    opacity: 0;
    transform: scale(1.03);
    filter: blur(6px);
    pointer-events: none;
  }
  .intro-inner{
    width: 100%;
    animation: introIn .9s var(--ease) both;
  }
  @keyframes introIn{
    from{ opacity:0; transform: translateY(22px); filter: blur(4px); }
    to{ opacity:1; transform:none; filter: blur(0); }
  }
  .intro .brand{
    font-size: 13px;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 26px;
  }
  .intro .headline{
    font-size: clamp(28px, 5.6vw, 59px);
    font-weight: 700;
    letter-spacing: -.03em;
    line-height: 1.2;
    max-width: 16ch;
  }
  .intro .subline{
    margin-top: 26px;
    font-size: 19px;
    color: var(--ink-soft);
    max-width: 56ch;
  }
  .enter{
    appearance: none;
    border: 0;
    cursor: pointer;
    font-family: inherit;
    margin-top: 44px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 30px;
    border-radius: 999px;
    background: var(--accent);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: .01em;
    box-shadow: 0 20px 45px -18px rgba(20,23,26,.55);
    transition: transform .35s var(--ease), box-shadow .35s var(--ease);
  }
  .enter:hover{ transform: translateY(-2px); box-shadow: 0 26px 55px -18px rgba(20,23,26,.6); }
  .enter:active{ transform: translateY(0); }
  .enter .arrow{ transition: transform .35s var(--ease); }
  .enter:hover .arrow{ transform: translateX(4px); }

  /* =======================================================================
     포트폴리오 앱 (인트로 이후)
     ======================================================================= */
  .app{ display:none; }
  .app.ready{ display:block; animation: appIn .7s var(--ease) both; }
  @keyframes appIn{
    from{ opacity:0; transform: translateY(16px); }
    to{ opacity:1; transform:none; }
  }

  /* ===== 헤더 / 메인 (작게 축소) ===== */
  header{
    padding: 30px 0 14px;
  }
  .brand{
    font-size: 12px;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }
  .brand.clickable{ cursor:pointer; display:inline-block; transition: color .3s var(--ease); }
  .brand.clickable:hover{ color: var(--ink); }
  .headline{
    font-size: clamp(20px, 3vw, 30px);
    font-weight: 700;
    letter-spacing: -.02em;
    line-height: 1.12;
    max-width: 22ch;
  }
  .subline{
    margin-top: 8px;
    font-size: 14px;
    color: var(--ink-soft);
    max-width: 64ch;
  }

  /* ===== 탭 (회사 이름 — 상단 가로 나열) ===== */
  nav.tabs{
    position: sticky;
    top: 0;
    z-index: 20;
    margin-top: 20px;
    padding: 12px 0;
    /* 흐릿한 유리 느낌 — 경계선 대신 blur */
    backdrop-filter: saturate(1.4) blur(14px);
    -webkit-backdrop-filter: saturate(1.4) blur(14px);
    background: linear-gradient(180deg, rgba(255,255,255,.85), rgba(255,255,255,.45));
  }
  #tabbar{
    display: flex;
    gap: 5px;
    flex-wrap: nowrap;
    overflow-x: auto;
    scrollbar-width: none;
  }
  #tabbar::-webkit-scrollbar{ display: none; }
  .tab{
    appearance: none;
    border: 0;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    padding: 7px 12px;
    border-radius: 999px;
    color: var(--ink-soft);
    flex: 0 0 auto;
    white-space: nowrap;
    transition: color .4s var(--ease), background .4s var(--ease), transform .4s var(--ease);
    text-align: left;
    line-height: 1.2;
  }
  .tab:hover{ color: var(--ink); background: rgba(20,23,26,.035); }
  .tab .t-name{ display:block; font-size:13px; font-weight:600; white-space:nowrap; }
  .tab .t-aff{ display:block; font-size:9px; letter-spacing:.04em; text-transform:uppercase; margin-top:2px; opacity:.6; white-space:nowrap; }
  .tab.active{
    color: #fff;
    background: var(--accent);
    box-shadow: 0 12px 30px -12px rgba(20,23,26,.5);
  }
  .tab.active .t-aff{ opacity:.65; }

  /* ===== 콘텐츠 영역: 좌측 프로젝트 리스트 + 우측 내용 ===== */
  main{ padding: 34px 0 120px; }

  .panel{ display:none; }
  .panel.show{ display:block; animation: panelIn .55s var(--ease) both; }
  @keyframes panelIn{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform:none; }
  }

  .layout{
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 10px;
    align-items: start;
  }

  /* 좌측 리스트 */
  .list{
    position: sticky;
    top: 84px;
    padding: 10px;
    border-radius: var(--radius);
  }
  .list h2{
    font-size: 12px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 8px 16px 14px;
    font-weight: 600;
  }
  .item{
    display: flex;
    align-items: flex-start;
    gap: 12px;
    width: 100%;
    text-align: left;
    border: 0;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    color: var(--ink-soft);
    padding: 13px 16px;
    border-radius: 14px;
    transition: color .35s var(--ease), background .35s var(--ease), padding .35s var(--ease);
  }
  .item:hover{ color: var(--ink); background: rgba(20,23,26,.03); }
  .item .idx{ font-size:12px; opacity:.55; min-width:22px; font-variant-numeric: tabular-nums; line-height:1.5; }
  .item .label-wrap{ display:flex; flex-direction:column; gap:2px; min-width:0; }
  .item .label{ font-size:16px; font-weight:500; line-height:1.3; }
  .item .sub{ font-size:11px; color:var(--ink-soft); opacity:.7; line-height:1.35; letter-spacing:.01em; }
  .item.active{ color: var(--ink); background: rgba(20,23,26,.05); padding-left: 22px; }
  .item.active .label{ font-weight:700; }

  /* 우측 내용 */
  .detailWrap{
    position: relative;
    min-height: 60vh;
    padding: 18px 26px;
  }
  .detail{ display:none; }
  .detail.show{ display:block; animation: detailIn .5s var(--ease) both; }
  @keyframes detailIn{
    from{ opacity:0; transform: translateY(16px) scale(.995); filter: blur(3px); }
    to{ opacity:1; transform:none; filter: blur(0); }
  }
  .detail .eyebrow{ font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-soft); }
  .detail h3{ font-size: clamp(26px,4vw,40px); font-weight:700; letter-spacing:-.02em; margin:10px 0 6px; }
  .detail .meta{ color: var(--ink-soft); font-size:14px; margin-bottom: 26px; }
  .cover{
    width:100%;
    aspect-ratio: 16/9;
    border-radius: var(--radius);
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
    display:flex; align-items:center; justify-content:center;
    color: rgba(255,255,255,.8);
    font-size:13px; letter-spacing:.15em; text-transform:uppercase;
    box-shadow: 0 30px 60px -30px rgba(20,23,26,.35);
  }
  .cover .slide{
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    opacity:0; transition: opacity 1.6s var(--ease);
  }
  .cover .slide.on{ opacity:1; }
  .detail p{ font-size:17px; color:#2c2f33; margin-bottom: 18px; max-width: 66ch; }
  .detail .reflink{ margin-top: 24px; }
  .detail .reflink a{
    display:inline-flex; align-items:center; gap:7px;
    font-size:14px; color: var(--ink); text-decoration:none;
    padding:10px 18px; border-radius:999px; background: rgba(20,23,26,.05);
    transition: background .3s var(--ease), transform .3s var(--ease);
  }
  .detail .reflink a:hover{ background: rgba(20,23,26,.1); transform: translateY(-1px); }
  .tags{ display:flex; flex-wrap:wrap; gap:8px; margin-top: 26px; }
  .tag{ font-size:13px; color:var(--ink-soft); padding:7px 14px; border-radius:999px; background: rgba(20,23,26,.045); }

  footer{ padding: 60px 0; color: var(--ink-soft); font-size: 13px; }

  /* 모바일 */
  @media (max-width: 820px){
    .wrap{ padding: 0 20px; }
    #tabbar{ flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab{ flex: 0 0 auto; }
    .layout{ grid-template-columns: 1fr; }
    .list{ position: static; display:flex; flex-wrap:wrap; gap:4px; padding: 4px 0 14px; top: 76px; }
    .list h2{ width:100%; padding: 6px 6px 8px; }
    .item{ width:auto; }
    .detailWrap{ padding: 8px 4px; }
  }

  /* 모션 최소화 설정 존중 */
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; transition-duration:.001ms !important; }
  }
</style>
</head>

      items: [
        { title: "Keisuke", meta: "Virtual Human" },
        { title: "TD1", meta: "Company Profile Pilot" },
        { title: "Naevis", meta: "TV Show" }
      ]
    }
  ]
};

/* ===== 렌더링 로직 (수정 불필요) ===== */
// 인트로
document.getElementById("introBrand").textContent = CONFIG.brand;
document.getElementById("introHeadline").innerHTML = CONFIG.intro.headline;
document.getElementById("introSubline").textContent = CONFIG.intro.subline;
document.getElementById("enterLabel").textContent = CONFIG.intro.enterLabel;

// 앱 헤더
document.getElementById("brand").textContent = CONFIG.brand;
document.getElementById("headline").innerHTML = CONFIG.headline;
document.getElementById("subline").innerHTML = CONFIG.subline;
document.getElementById("footer").textContent = CONFIG.footer;

const tabbar = document.getElementById("tabbar");
const panels = document.getElementById("panels");

// 프로젝트별 커버 색이 지정 안 됐을 때 순환 사용할 팔레트
const PALETTE = [
  "linear-gradient(135deg,#8a7bff,#5cc9ff)",
  "linear-gradient(135deg,#ff8a5c,#ffd36e)",
  "linear-gradient(135deg,#43c59e,#c6f6a1)",
  "linear-gradient(135deg,#e23744,#ff8a8a)",
  "linear-gradient(135deg,#2f6bff,#7ad0ff)",
  "linear-gradient(135deg,#7c5cff,#b18cff)",
  "linear-gradient(135deg,#ff6ec4,#7873f5)",
  "linear-gradient(135deg,#12c2e9,#c471ed)",
  "linear-gradient(135deg,#111827,#5b6472)",
  "linear-gradient(135deg,#f7971e,#ffd200)"
];

CONFIG.tabs.forEach((tab, ti) => {
  // 탭 버튼
  const btn = document.createElement("button");
  btn.className = "tab" + (ti === 0 ? " active" : "");
  btn.innerHTML = `<span class="t-name">${tab.name}</span><span class="t-aff">${tab.affiliation}</span>`;
  btn.addEventListener("click", () => selectTab(ti));
  tabbar.appendChild(btn);

  // 패널 (좌측 리스트 + 우측 내용)
  const panel = document.createElement("section");
  panel.className = "panel" + (ti === 0 ? " show" : "");
  panel.dataset.tab = ti;

  const list = tab.items.map((it, ii) => `
    <button class="item${ii === 0 ? " active" : ""}" data-tab="${ti}" data-item="${ii}">
      <span class="idx">${String(ii + 1).padStart(2, "0")}</span>
      <span class="label-wrap">
        <span class="label">${it.title}</span>
        ${it.meta ? `<span class="sub">${it.meta}</span>` : ""}
      </span>
    </button>`).join("");

  const details = tab.items.map((it, ii) => {
    let coverHTML;
    if (it.images && it.images.length){
      const slides = it.images.map((src, si) =>
        `<div class="slide${si === 0 ? " on" : ""}" style="background-image:url('${src}')"></div>`
      ).join("");
      coverHTML = `<div class="cover slideshow">${slides}</div>`;
    } else {
      const coverStyle = it.image
        ? `background:url('${it.image}') center/cover no-repeat;`
        : `background:${it.cover || PALETTE[ii % PALETTE.length]};`;
      coverHTML = `<div class="cover" style="${coverStyle}">${it.image ? "" : "PREVIEW"}</div>`;
    }
    return `
    <article class="detail${ii === 0 ? " show" : ""}" data-tab="${ti}" data-item="${ii}">
      <div class="eyebrow">${tab.name} · ${tab.affiliation}</div>
      <h3>${it.title}</h3>
      <div class="meta">${it.meta || ""}</div>
      ${coverHTML}
      ${(it.body || []).map(p => `<p>${p}</p>`).join("")}
      ${it.link ? `<div class="reflink"><a href="${it.link}" target="_blank" rel="noopener">참고 링크 <span aria-hidden="true">↗</span></a></div>` : ""}
      <div class="tags">${(it.tags || []).map(t => `<span class="tag">${t}</span>`).join("")}</div>
    </article>`;
  }).join("");

  panel.innerHTML = `
    <div class="layout">
      <aside class="list">
        <h2>${tab.name}</h2>
        ${list}
      </aside>
      <div class="detailWrap">${details}</div>
    </div>`;
  panels.appendChild(panel);
});

// 이미지가 여러 장인 커버 → 3초마다 천천히 크로스페이드
function initSlideshows(){
  document.querySelectorAll(".cover.slideshow").forEach(sc => {
    const slides = Array.from(sc.querySelectorAll(".slide"));
    if (slides.length < 2) return;
    let idx = 0;
    setInterval(() => {
      slides[idx].classList.remove("on");
      idx = (idx + 1) % slides.length;
      slides[idx].classList.add("on");
    }, 3000);
  });
}
initSlideshows();

function selectTab(ti){
  document.querySelectorAll(".tab").forEach((b, i) => b.classList.toggle("active", i === ti));
  document.querySelectorAll(".panel").forEach((p) => {
    const on = Number(p.dataset.tab) === ti;
    if (on){ p.classList.remove("show"); void p.offsetWidth; p.classList.add("show"); }
    else p.classList.remove("show");
  });
  // 강제 스크롤 제거 — 헤더가 깜빡이던 문제의 원인이었습니다.
}

// 리스트 항목 선택 → 우측 내용 전환
panels.addEventListener("click", (e) => {
  const item = e.target.closest(".item");
  if (!item) return;
  const ti = item.dataset.tab, ii = item.dataset.item;
  document.querySelectorAll(`.item[data-tab="${ti}"]`).forEach(b => b.classList.remove("active"));
  item.classList.add("active");
  document.querySelectorAll(`.detail[data-tab="${ti}"]`).forEach(d => {
    const on = d.dataset.item === ii;
    if (on){ d.classList.remove("show"); void d.offsetWidth; d.classList.add("show"); }
    else d.classList.remove("show");
  });
});

/* ===== 인트로 → 앱 전환 ===== */
const intro = document.getElementById("intro");
const app = document.getElementById("app");

function enterApp(){
  intro.classList.add("leaving");
  app.classList.add("ready");
  window.scrollTo(0, 0);
  setTimeout(() => { intro.style.display = "none"; }, 700);
}
function backToIntro(){
  intro.style.display = "flex";
  // 리플로우 후 페이드 인
  void intro.offsetWidth;
  intro.classList.remove("leaving");
  app.classList.remove("ready");
  window.scrollTo(0, 0);
}

document.getElementById("enterBtn").addEventListener("click", enterApp);
document.getElementById("brand").addEventListener("click", backToIntro);
</script>
</body>
</html>

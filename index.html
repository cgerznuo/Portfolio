<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portfolio</title>
<style>
  /* ===== 데이터·색은 아래 CONFIG(스크립트)에서 바꾸세요 ===== */
  :root{
    --bg: #ffffff;
    --ink: #16171a;         /* 본문 글자 */
    --ink-soft: #6b7075;    /* 보조 글자 */
    --line: rgba(20,23,26,.07); /* 아주 흐린 경계 */
    --accent: #16171a;      /* 강조(선택된 항목) */
    --panel: rgba(255,255,255,.6);
    --radius: 22px;
    --ease: cubic-bezier(.22,.61,.36,1);
    --font: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI",
            "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family: var(--font);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.6;
    /* 아주 은은한 배경 글로우 — 흰 바탕에 경계감을 지운다 */
    background-image:
      radial-gradient(1200px 700px at 12% -8%, rgba(120,130,255,.055), transparent 60%),
      radial-gradient(1000px 600px at 108% 10%, rgba(255,150,120,.045), transparent 55%);
    background-attachment: fixed;
  }

  .wrap{
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* ===== 헤더 / 메인 ===== */
  header{
    padding: 78px 0 26px;
  }
  .brand{
    font-size: 13px;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }
  .headline{
    font-size: clamp(34px, 6vw, 62px);
    font-weight: 700;
    letter-spacing: -.02em;
    line-height: 1.05;
    max-width: 15ch;
  }
  .subline{
    margin-top: 20px;
    font-size: 18px;
    color: var(--ink-soft);
    max-width: 58ch;
  }

  /* ===== 탭 ===== */
  nav.tabs{
    position: sticky;
    top: 0;
    z-index: 20;
    margin-top: 40px;
    padding: 14px 0;
    /* 흐릿한 유리 느낌 — 경계선 대신 blur */
    backdrop-filter: saturate(1.4) blur(14px);
    -webkit-backdrop-filter: saturate(1.4) blur(14px);
    background: linear-gradient(180deg, rgba(255,255,255,.85), rgba(255,255,255,.45));
  }
  .tabs .wrap{
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tab{
    appearance: none;
    border: 0;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    padding: 12px 20px;
    border-radius: 999px;
    color: var(--ink-soft);
    transition: color .4s var(--ease), background .4s var(--ease), transform .4s var(--ease);
    text-align: left;
    line-height: 1.2;
  }
  .tab:hover{ color: var(--ink); background: rgba(20,23,26,.035); }
  .tab .t-name{ display:block; font-size:16px; font-weight:600; }
  .tab .t-aff{ display:block; font-size:11px; letter-spacing:.14em; text-transform:uppercase; margin-top:3px; opacity:.7; }
  .tab.active{
    color: #fff;
    background: var(--accent);
    box-shadow: 0 12px 30px -12px rgba(20,23,26,.5);
  }
  .tab.active .t-aff{ opacity:.65; }

  /* ===== 콘텐츠 영역: 좌측 리스트 + 우측 내용 ===== */
  main{ padding: 40px 0 120px; }

  .panel{ display:none; }
  .panel.show{ display:block; animation: panelIn .55s var(--ease) both; }
  @keyframes panelIn{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform:none; }
  }

  .layout{
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 10px;
    align-items: start;
  }

  /* 좌측 리스트 */
  .list{
    position: sticky;
    top: 92px;
    padding: 10px;
    border-radius: var(--radius);
  }
  .list h2{
    font-size: 12px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 8px 16px 14px;
    font-weight: 600;
  }
  .item{
    display: flex;
    align-items: baseline;
    gap: 12px;
    width: 100%;
    text-align: left;
    border: 0;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    color: var(--ink-soft);
    padding: 13px 16px;
    border-radius: 14px;
    transition: color .35s var(--ease), background .35s var(--ease), padding .35s var(--ease);
  }
  .item:hover{ color: var(--ink); background: rgba(20,23,26,.03); }
  .item .idx{ font-size:12px; opacity:.55; min-width:22px; font-variant-numeric: tabular-nums; }
  .item .label{ font-size:16px; font-weight:500; }
  .item.active{ color: var(--ink); background: rgba(20,23,26,.05); padding-left: 22px; }
  .item.active .label{ font-weight:700; }

  /* 우측 내용 */
  .detailWrap{
    position: relative;
    min-height: 60vh;
    padding: 18px 26px;
  }
  .detail{ display:none; }
  .detail.show{ display:block; animation: detailIn .5s var(--ease) both; }
  @keyframes detailIn{
    from{ opacity:0; transform: translateY(16px) scale(.995); filter: blur(3px); }
    to{ opacity:1; transform:none; filter: blur(0); }
  }
  .detail .eyebrow{ font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-soft); }
  .detail h3{ font-size: clamp(26px,4vw,40px); font-weight:700; letter-spacing:-.02em; margin:10px 0 6px; }
  .detail .meta{ color: var(--ink-soft); font-size:14px; margin-bottom: 26px; }
  .cover{
    width:100%;
    aspect-ratio: 16/9;
    border-radius: var(--radius);
    margin-bottom: 28px;
    display:flex; align-items:center; justify-content:center;
    color: rgba(255,255,255,.8);
    font-size:13px; letter-spacing:.15em; text-transform:uppercase;
    box-shadow: 0 30px 60px -30px rgba(20,23,26,.35);
  }
  .detail p{ font-size:17px; color:#2c2f33; margin-bottom: 18px; max-width: 66ch; }
  .tags{ display:flex; flex-wrap:wrap; gap:8px; margin-top: 26px; }
  .tag{ font-size:13px; color:var(--ink-soft); padding:7px 14px; border-radius:999px; background: rgba(20,23,26,.045); }

  footer{ padding: 60px 0; color: var(--ink-soft); font-size: 13px; }

  /* 모바일 */
  @media (max-width: 820px){
    .wrap{ padding: 0 20px; }
    .layout{ grid-template-columns: 1fr; }
    .list{ position: static; display:flex; flex-wrap:wrap; gap:4px; padding: 4px 0 14px; }
    .list h2{ width:100%; padding: 6px 6px 8px; }
    .item{ width:auto; }
    .detailWrap{ padding: 8px 4px; }
  }
</style>
</head>
<body>

  <header>
    <div class="wrap">
      <div class="brand" id="brand">STUDIO / PORTFOLIO</div>
      <h1 class="headline" id="headline">생각을 형태로,<br>형태를 경험으로.</h1>
      <p class="subline" id="subline">브랜딩부터 디지털·모션까지 — 아래 탭에서 작업 분야를 고르고, 왼쪽 목록에서 프로젝트를 선택해 자세히 살펴보세요.</p>
    </div>
  </header>

  <nav class="tabs">
    <div class="wrap" id="tabbar"></div>
  </nav>

  <main>
    <div class="wrap">
      <div id="panels"></div>
    </div>
  </main>

  <footer>
    <div class="wrap" id="footer">© 2026 Studio Portfolio</div>
  </footer>

<script>
/* =======================================================================
   여기만 고치면 됩니다 — CONFIG
   - tabs: 상단 탭. name(탭이름) + affiliation(소속/분류) + items(왼쪽 리스트)
   - items 안의 각 프로젝트: title, meta, cover(색), body(문단 배열), tags(배열)
   ======================================================================= */
const CONFIG = {
  brand: "STUDIO / PORTFOLIO",
  headline: "생각을 형태로,<br>형태를 경험으로.",
  subline: "브랜딩부터 디지털·모션까지 — 아래 탭에서 작업 분야를 고르고, 왼쪽 목록에서 프로젝트를 선택해 자세히 살펴보세요.",
  footer: "© 2026 Studio Portfolio · hello@studio.com",
  tabs: [
    {
      name: "Information",
      affiliation: "Overview",
      items: [
        {
          title: "소개",
          meta: "Portfolio Overview",
          cover: "linear-gradient(135deg,#c7cdd6,#eef1f5)",
          body: [
            "여러 스튜디오·회사의 작업을 한곳에 모은 통합 포트폴리오입니다. 상단 탭에서 회사를 고르고, 왼쪽 목록에서 프로젝트를 선택하세요.",
            "이 페이지는 서버 없이 동작하는 단일 HTML 파일로, NAS나 정적 호스팅에 그대로 올릴 수 있습니다.",
            "문의: hello@example.com"
          ],
          tags: ["Semologic", "Orange Studio", "CJ PowerCast", "AZworks", "Studio Gale", "VAcorp", "Studio Realive"]
        }
      ]
    },
    {
      name: "Semologic",
      affiliation: "Projects",
      items: [
        {
          title: "프로젝트 1",
          meta: "연도 · 분야",
          cover: "linear-gradient(135deg,#8a7bff,#5cc9ff)",
          body: [
            "여기에 Semologic 프로젝트 설명을 넣으세요. (예시 텍스트입니다.)"
          ],
          tags: ["태그1", "태그2"]
        },
        {
          title: "프로젝트 2",
          meta: "연도 · 분야",
          cover: "linear-gradient(135deg,#5cc9ff,#a0e9ff)",
          body: [
            "두 번째 프로젝트 설명."
          ],
          tags: ["태그1"]
        }
      ]
    },
    {
      name: "Orange Studio",
      affiliation: "Projects",
      items: [
        {
          title: "프로젝트 1",
          meta: "연도 · 분야",
          cover: "linear-gradient(135deg,#ff8a5c,#ffd36e)",
          body: [
            "여기에 Orange Studio 프로젝트 설명을 넣으세요."
          ],
          tags: ["태그1", "태그2"]
        }
      ]
    },
    {
      name: "CJ PowerCast",
      affiliation: "Projects",
      items: [
        {
          title: "프로젝트 1",
          meta: "연도 · 분야",
          cover: "linear-gradient(135deg,#e23744,#ff8a8a)",
          body: [
            "여기에 CJ PowerCast 프로젝트 설명을 넣으세요."
          ],
          tags: ["태그1"]
        }
      ]
    },
    {
      name: "AZworks",
      affiliation: "Projects",
      items: [
        {
          title: "프로젝트 1",
          meta: "연도 · 분야",
          cover: "linear-gradient(135deg,#2f6bff,#7ad0ff)",
          body: [
            "여기에 AZworks 프로젝트 설명을 넣으세요."
          ],
          tags: ["태그1"]
        }
      ]
    },
    {
      name: "Studio Gale",
      affiliation: "Projects",
      items: [
        {
          title: "프로젝트 1",
          meta: "연도 · 분야",
          cover: "linear-gradient(135deg,#43c59e,#c6f6a1)",
          body: [
            "여기에 Studio Gale 프로젝트 설명을 넣으세요."
          ],
          tags: ["태그1"]
        }
      ]
    },
    {
      name: "VAcorp",
      affiliation: "Projects",
      items: [
        {
          title: "프로젝트 1",
          meta: "연도 · 분야",
          cover: "linear-gradient(135deg,#7c5cff,#b18cff)",
          body: [
            "여기에 VAcorp 프로젝트 설명을 넣으세요."
          ],
          tags: ["태그1"]
        }
      ]
    },
    {
      name: "Studio Realive",
      affiliation: "Projects",
      items: [
        {
          title: "프로젝트 1",
          meta: "연도 · 분야",
          cover: "linear-gradient(135deg,#111827,#5b6472)",
          body: [
            "여기에 Studio Realive 프로젝트 설명을 넣으세요."
          ],
          tags: ["태그1"]
        }
      ]
    }
  ]
};

/* ===== 렌더링 로직 (수정 불필요) ===== */
document.getElementById("brand").textContent = CONFIG.brand;
document.getElementById("headline").innerHTML = CONFIG.headline;
document.getElementById("subline").textContent = CONFIG.subline;
document.getElementById("footer").textContent = CONFIG.footer;

const tabbar = document.getElementById("tabbar");
const panels = document.getElementById("panels");

CONFIG.tabs.forEach((tab, ti) => {
  // 탭 버튼
  const btn = document.createElement("button");
  btn.className = "tab" + (ti === 0 ? " active" : "");
  btn.innerHTML = `<span class="t-name">${tab.name}</span><span class="t-aff">${tab.affiliation}</span>`;
  btn.addEventListener("click", () => selectTab(ti));
  tabbar.appendChild(btn);

  // 패널 (좌측 리스트 + 우측 내용)
  const panel = document.createElement("section");
  panel.className = "panel" + (ti === 0 ? " show" : "");
  panel.dataset.tab = ti;

  const list = tab.items.map((it, ii) => `
    <button class="item${ii === 0 ? " active" : ""}" data-tab="${ti}" data-item="${ii}">
      <span class="idx">${String(ii + 1).padStart(2, "0")}</span>
      <span class="label">${it.title}</span>
    </button>`).join("");

  const details = tab.items.map((it, ii) => `
    <article class="detail${ii === 0 ? " show" : ""}" data-tab="${ti}" data-item="${ii}">
      <div class="eyebrow">${tab.name} · ${tab.affiliation}</div>
      <h3>${it.title}</h3>
      <div class="meta">${it.meta}</div>
      <div class="cover" style="background:${it.cover}">PREVIEW</div>
      ${it.body.map(p => `<p>${p}</p>`).join("")}
      <div class="tags">${it.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
    </article>`).join("");

  panel.innerHTML = `
    <div class="layout">
      <aside class="list">
        <h2>${tab.name}</h2>
        ${list}
      </aside>
      <div class="detailWrap">${details}</div>
    </div>`;
  panels.appendChild(panel);
});

function selectTab(ti){
  document.querySelectorAll(".tab").forEach((b, i) => b.classList.toggle("active", i === ti));
  document.querySelectorAll(".panel").forEach((p) => {
    const on = Number(p.dataset.tab) === ti;
    if (on){ p.classList.remove("show"); void p.offsetWidth; p.classList.add("show"); }
    else p.classList.remove("show");
  });
  window.scrollTo({ top: document.querySelector("nav.tabs").offsetTop - 0, behavior: "smooth" });
}

// 리스트 항목 선택 → 우측 내용 전환
panels.addEventListener("click", (e) => {
  const item = e.target.closest(".item");
  if (!item) return;
  const ti = item.dataset.tab, ii = item.dataset.item;
  document.querySelectorAll(`.item[data-tab="${ti}"]`).forEach(b => b.classList.remove("active"));
  item.classList.add("active");
  document.querySelectorAll(`.detail[data-tab="${ti}"]`).forEach(d => {
    const on = d.dataset.item === ii;
    if (on){ d.classList.remove("show"); void d.offsetWidth; d.classList.add("show"); }
    else d.classList.remove("show");
  });
});
</script>
</body>
</html>
